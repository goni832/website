<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Welcome to our website">
    <title>Home - Goni832</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            background-color: #1F2020;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            max-width: 100%;
        }
        
        header {
            background-color: #3C3C3C;
            color: rgb(255, 255, 255);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        nav {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        nav ul {
            display: flex;
            list-style: none;
            gap: 2rem;
        }
        
        nav a {
            color: rgb(255, 255, 255);
            text-decoration: none;
            transition: color 0.3s;
        }
        
        nav a:hover {
            color: #999999;
        }
        
        main {
            max-width: 1200px;
            width: 90%;
            margin: 0 auto;
            padding: 2rem 1rem;
            flex: 1;
        }
        
        .bighero {
            --width: ;
            --height: 20%;

            text-align: center;

            height: var(--height);
            width: 100%;
            padding: 2.5rem 6rem 2rem 6rem;
            background: linear-gradient(315deg, #3C3C3C 0%, #676767 100%);
            color: rgb(255, 255, 255);
            border-radius: 8px;
            margin-bottom: 2rem;
            transition: padding 250ms ease;
        }
        
        .hero {
            --width: ;
            --height: 20%;

            text-align: center;

            height: var(--height);
            width: 90%;
            padding: 2.5rem 6rem 2rem 6rem;
            background: linear-gradient(315deg, #3C3C3C 0%, #676767 100%);
            color: rgb(255, 255, 255);
            border-radius: 8px;
            margin: 2rem auto 0;
            transition: padding 250ms ease;
        }
        
        .hero h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }
        
        
        .hero p {
            font-size: 1.2rem;
            margin-bottom: 1.5rem;
        }
        
        .btn {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            background-color: #808080;
            color: rgb(255, 255, 255);
            text-decoration: none;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        
        .btn:hover {
            background-color: #707070;
        }

        .btn2 {
            color: rgb(255, 255, 255);
            text-decoration: none;
            transition: background-color 0.3s;
            font-size: 2.5rem;
            display: inline-block;
            width:fit-content;
        }

        .btn2:hover {
            color: #999999;
        }
        
        .content {
            --width: ;
            --height: ;

            text-align: center;

            height: var(--height);
            width: var(--width);
            margin: 2rem 0;
        }
        
        .content h2 {
            color: #2c3e50;
            margin-bottom: 1rem;
        }
        
        footer {
            background-color: #3C3C3C;
            color: rgb(255, 255, 255);
            text-align: center;
            padding: 1.5rem;
            margin-top: 0;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <h2>Goni832</h2>
            </div>
            <ul>

                <li><a href="links.html">Links</a></li>
                <li><a href="contact.html">Contact</a></li>

        <section id="tft-container" class="hero">

                    <p style="margin:0rem">Blacklisted units:</p>
                    <select id="tft-selector" style="margin-top:0.5rem; padding:0.5rem; font-size:1rem;">
                        <option value="">Select units:</option>
                    </select>

                    <label style="margin-right:1rem;">

                    </label>
                    <label style="margin-right:1rem;">

                    </label>
                    <label style="margin-right:1rem;">

                    </label>
                    <label style="margin-right:1rem;">

                </div>

                <div style="width:150px">
                    <p style="margin:0rem">Forced unit:</p>
                    <select id="unit-selector" style="margin-top:0.5rem; padding:0.5rem; font-size:1rem;">
                        <option value="">Select unit:</option>
                    </select>
                </div>
            </div>
            
            <a id="tft-ultimate-bravery" class="btn" href="#">I'm brave!</a>
            <div id="tft-results" class="content"></div>

        </div>
        </section>

    </main>

    <footer>
        <p>&copy; 2026 Goni832. Non commercial.</p>
    </footer>
    <script src="tft-ultimate-bravery.js"></script>

</html>
